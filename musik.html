<script>
// Highlight active nav link
function setActiveNav() {
    const links = document.querySelectorAll('.nav-link');
    const scrollPos = window.scrollY + 120;
    let activeFound = false;
    
    links.forEach(link => {
        const section = document.querySelector(link.getAttribute('href'));
        if (section) {
            const top = section.offsetTop;
            const bottom = top + section.offsetHeight;
            if (scrollPos >= top && scrollPos < bottom && !activeFound) {
                link.classList.add('active');
                activeFound = true;
            } else {
                link.classList.remove('active');
            }
        }
    });
}

window.addEventListener('scroll', setActiveNav);
window.addEventListener('load', setActiveNav);

// Audio player functionality
function togglePlay(button) {
    const player = button.closest('.audio-player');
    const audio = player.querySelector('audio');
    
    // Pause all other audio elements
    document.querySelectorAll('audio').forEach(otherAudio => {
        if (otherAudio !== audio && !otherAudio.paused) {
            otherAudio.pause();
            const otherButton = otherAudio.closest('.audio-player').querySelector('.play-btn');
            otherButton.textContent = '▶';
        }
    });
    
    if (audio.paused) {
        audio.play();
        button.textContent = '⏸';
    } else {
        audio.pause();
        button.textContent = '▶';
    }
    
    audio.addEventListener('loadedmetadata', () => {
    const durationElement = player.querySelector('.duration');
    if (audio.duration && !isNaN(audio.duration)) {
        const minutes = Math.floor(audio.duration / 60);
        const seconds = Math.floor(audio.duration % 60);
        durationElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }
});

    // Update progress bar
    audio.addEventListener('timeupdate', () => updateProgress(player));
    audio.addEventListener('ended', () => {
        button.textContent = '▶';
        player.querySelector('.progress-bar').style.width = '0%';
        player.querySelector('.current-time').textContent = '0:00';
    });
}

function updateProgress(player) {
    const audio = player.querySelector('audio');
    const progressBar = player.querySelector('.progress-bar');
    const currentTimeElement = player.querySelector('.current-time');
    
    if (audio.duration) {
        const progress = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = progress + '%';
        
        const minutes = Math.floor(audio.currentTime / 60);
        const seconds = Math.floor(audio.currentTime % 60);
        currentTimeElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }
}

function setProgress(event, progressContainer) {
    const player = progressContainer.closest('.audio-player');
    const audio = player.querySelector('audio');
    const rect = progressContainer.getBoundingClientRect();
    const percent = (event.clientX - rect.left) / rect.width;
    
    if (audio.duration) {
        audio.currentTime = percent * audio.duration;
    }
}

// Initialize duration display for all audio elements on page load
window.addEventListener('load', () => {
    document.querySelectorAll('audio').forEach(audio => {
        const player = audio.closest('.audio-player');
        const durationElement = player.querySelector('.duration');
        
        audio.addEventListener('loadedmetadata', () => {
            if (audio.duration && !isNaN(audio.duration)) {
                const minutes = Math.floor(audio.duration / 60);
                const seconds = Math.floor(audio.duration % 60);
                durationElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        });
        
        // If metadata is already loaded
        if (audio.readyState >= 1) {
            if (audio.duration && !isNaN(audio.duration)) {
                const minutes = Math.floor(audio.duration / 60);
                const seconds = Math.floor(audio.duration % 60);
                durationElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        }
    });
});

// Smooth scrolling for navigation links
document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', function(e) {
        e.preventDefault();
        const targetId = this.getAttribute('href');
        const targetSection = document.querySelector(targetId);
        
        if (targetSection) {
            const offsetTop = targetSection.offsetTop - 100;
            window.scrollTo({
                top: offsetTop,
                behavior: 'smooth'
            });
        }
    });
});


let currentTrack = null;

function loadTrack(src) {
    const audio = document.getElementById('global-audio');
    const playBtn = document.querySelector('#global-player .play-btn');
    audio.src = src;
    audio.play();
    playBtn.textContent = '⏸';
}

// Play/Pause
function togglePlayGlobal() {
    const audio = document.getElementById('global-audio');
    const playBtn = document.querySelector('#global-player .play-btn');
    if (audio.paused) {
        audio.play();
        playBtn.textContent = '⏸';
    } else {
        audio.pause();
        playBtn.textContent = '▶';
    }
}

// Update progress bar
document.getElementById('global-audio').addEventListener('timeupdate', () => {
    const audio = document.getElementById('global-audio');
    const progressBar = document.getElementById('global-progress-bar');
    const currentTimeEl = document.getElementById('global-current-time');
    const progress = (audio.currentTime / audio.duration) * 100;
    progressBar.style.width = progress + '%';
    const minutes = Math.floor(audio.currentTime / 60);
    const seconds = Math.floor(audio.currentTime % 60);
    currentTimeEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
});

// Set duration
document.getElementById('global-audio').addEventListener('loadedmetadata', () => {
    const audio = document.getElementById('global-audio');
    const durationEl = document.getElementById('global-duration');
    const minutes = Math.floor(audio.duration / 60);
    const seconds = Math.floor(audio.duration % 60);
    durationEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
});

// Click to set progress
function setProgressGlobal(e) {
    const audio = document.getElementById('global-audio');
    const container = e.currentTarget;
    const rect = container.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    audio.currentTime = percent * audio.duration;
}

// Load into your global player if present, otherwise just mark active
function loadTrack(src, el) {
  // 1) Update global audio if it exists
  const audio = document.getElementById('global-audio') || document.querySelector('audio');
  if (audio) {
    // Avoid unnecessary reloads
    const absoluteSrc = new URL(src, location.href).href;
    if (audio.src !== absoluteSrc) audio.src = src;
    audio.play().catch(() => {/* no-op */});

    // Optional: update a global play button if you have one
    const playBtn = document.querySelector('#global-player .play-btn');
    if (playBtn) playBtn.textContent = '⏸';
  }

  // 2) Toggle active class
  document.querySelectorAll('.music-box li').forEach(li => li.classList.remove('active'));
  el.classList.add('active');
}


</script>
